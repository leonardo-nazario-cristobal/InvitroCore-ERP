<!doctype html>
<html lang="es">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>InvitroCore ERP — Login</title>
      <link
         rel="stylesheet"
         href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      />
      <link rel="stylesheet" href="../frontend/css/variables.css" />
      <link rel="stylesheet" href="../frontend/css/styles.css" />
   </head>
   <body class="d-flex align-items-center justify-content-center min-vh-100">
      <div class="card" style="width: 100%; max-width: 420px">
         <div class="card-body p-4">
            <div class="text-center mb-4">
               <h4 class="fw-bold">InvitroCore</h4>
               <p class="text-muted mb-0">Inicia sesión para continuar</p>
            </div>

            <div
               id="alerta"
               class="alert alert-danger d-none"
               role="alert"
            ></div>

            <form id="formLogin">
               <div class="mb-3">
                  <label class="form-label">Correo</label>
                  <input
                     type="email"
                     id="correo"
                     class="form-control"
                     placeholder="correo@invitrocore.com"
                     autocomplete="off"
                     required
                  />
               </div>
               <div class="mb-4">
                  <label class="form-label">Contraseña</label>
                  <input
                     type="password"
                     id="password"
                     class="form-control"
                     placeholder="••••••••"
                     autocomplete="off"
                     required
                  />
                  <div class="form-check mt-2">
                     <input
                        class="form-check-input"
                        type="checkbox"
                        id="verPassword"
                     />
                     <label class="form-check-label" for="verPassword">
                        Mostrar contraseña
                     </label>
                  </div>
               </div>
               <button
                  type="submit"
                  id="btnLogin"
                  class="btn btn-primary w-100"
               >
                  Iniciar Sesión
               </button>
            </form>
         </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <script src="js/auth.js"></script>
   </body>
</html>
